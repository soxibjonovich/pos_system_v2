version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: pos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pos_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  database_api:
    build: ./backend/database
    container_name: database_api
    ports:
      - "8002:8002"
    volumes:
      - ./backend/database/data:/app/data
      - ./uploads:/uploads
    environment:
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 45s
    restart: unless-stopped

  auth_api:
    build: ./backend/auth
    container_name: auth_api
    ports:
      - "8000:8003"
    environment:
      DATABASE_SERVICE_URL: http://database_api:8002
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${JWT_SECRET:-your-secret-key-change-in-production}
      ALGORITHM: HS256
    depends_on:
      redis:
        condition: service_healthy
      database_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  admin_api:
    build: ./backend/admin
    container_name: admin_api
    ports:
      - "8001:8001"
    volumes:
      - ./uploads:/uploads
    environment:
      DATABASE_SERVICE_URL: http://database_api:8002
      AUTH_SERVICE_URL: http://auth_api:8003
    depends_on:
      database_api:
        condition: service_healthy
      auth_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  staff_api:
    build: ./backend/staff
    container_name: staff_api
    ports:
      - "8003:8005"
    environment:
      DATABASE_SERVICE_URL: http://database_api:8002
      AUTH_SERVICE_URL: http://auth_api:8003
      ORDER_SERVICE_URL: http://order_api:8004
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
    depends_on:
      database_api:
        condition: service_healthy
      auth_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  order_api:
    build: ./backend/order
    container_name: order_api
    ports:
      - "8004:8004"
    environment:
      DATABASE_SERVICE_URL: http://database_api:8002
      AUTH_SERVICE_URL: http://auth_api:8003
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672/
    depends_on:
      database_api:
        condition: service_healthy
      auth_api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pos_frontend
    ports:
      - "80:80"
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      auth_api:
        condition: service_healthy
      admin_api:
        condition: service_healthy
      staff_api:
        condition: service_healthy
      order_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:

networks:
  default:
    name: pos_network
