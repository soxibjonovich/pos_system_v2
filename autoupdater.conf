# Auto-updater config

# Project root
REPO_DIR="/Users/soxibjonovich/Documents/Programming/DeveloperPython/Projects/pos_system_v2"

# Git source
REMOTE="origin"
BRANCH="main"

# Choose compose file
COMPOSE_FILE="docker-compose-deploy.yml"
# COMPOSE_FILE="docker-compose.yml"

# Force mode: drops ALL local changes before deploy
FORCE_UPDATE="true"

# Build/deploy options
PULL_IMAGES="true"
BUILD_IMAGES="true"
REMOVE_ORPHANS="true"

# Health checks after update
RUN_HEALTHCHECKS="true"
HEALTH_URLS="http://localhost/ http://localhost:8000/health http://localhost:8001/health http://localhost:8002/health http://localhost:8003/health http://localhost:8004/health"
